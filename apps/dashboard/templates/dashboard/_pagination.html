{% if page_obj.paginator.num_pages > 1 or page_obj.paginator.count %}
<div class="pagination">
  {% if page_obj.has_previous %}
  <a class="btn secondary" href="?page={{ page_obj.previous_page_number }}{% if query %}&q={{ query }}{% endif %}{% if page_size %}&page_size={{ page_size }}{% endif %}">&larr; Previous</a>
  {% endif %}
  <span class="muted">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }} &middot; {{ page_obj.paginator.count }} total</span>
  {% if page_obj.has_next %}
  <a class="btn secondary" href="?page={{ page_obj.next_page_number }}{% if query %}&q={{ query }}{% endif %}{% if page_size %}&page_size={{ page_size }}{% endif %}">Next &rarr;</a>
  {% endif %}
</div>
{% endif %}
