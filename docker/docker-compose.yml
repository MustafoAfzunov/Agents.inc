version: "3.9"

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      POSTGRES_HOST: db
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: >-
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newsgraph}
      POSTGRES_USER: ${POSTGRES_USER:-newsgraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newsgraph}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
