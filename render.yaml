# Render Blueprint - https://render.com/docs/blueprint-spec
# Spins up a managed Postgres database + a Django web service.
databases:
  - name: news-graph-db
    plan: free
    databaseName: newsgraph
    user: newsgraph

services:
  - type: web
    name: news-graph
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    # Very long timeout because /rescan ingests synchronously and the free
    # instance is CPU-throttled (a 2-page crawl + LLM pass can take many
    # minutes). 2 workers so a slow rescan never blocks the health check.
    startCommand: "gunicorn config.wsgi:application --timeout 1800 --workers 2 --graceful-timeout 60"
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: news-graph-db
          property: connectionString
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      # Set this in the Render dashboard (Environment tab) - kept secret.
      - key: OPENAI_API_KEY
        sync: false
